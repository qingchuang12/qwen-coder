<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Sidebar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #1a1a2e;
            color: white;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 {
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .site-selector {
            flex: 1;
            padding: 8px 10px;
            border: none;
            border-radius: 6px;
            background: white;
            color: #333;
            font-size: 13px;
            cursor: pointer;
            min-width: 0;
        }
        
        .site-selector:focus {
            outline: 2px solid #4a90d9;
            outline-offset: 1px;
        }
        
        .iframe-container {
            flex: 1;
            position: relative;
            background: white;
        }
        
        .site-frame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
            text-align: center;
            color: white;
            z-index: 100;
        }
        
        .frame-overlay.active {
            display: flex;
        }
        
        .frame-overlay h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .frame-overlay p {
            margin-bottom: 15px;
            font-size: 13px;
            opacity: 0.8;
        }
        
        .btn-open-new {
            background: #4a90d9;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .btn-open-new:hover {
            background: #3a7bc8;
        }
        
        .manage-section {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 10px;
            max-height: 40%;
            overflow-y: auto;
        }
        
        .manage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .manage-header h2 {
            font-size: 14px;
            color: #333;
        }
        
        .site-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .site-item {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid #e0e0e0;
        }
        
        .site-item:hover {
            background: #e8f4fc;
            border-color: #4a90d9;
        }
        
        .site-item.active {
            background: #e8f4fc;
            border-color: #4a90d9;
        }
        
        .site-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        
        .site-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        
        .site-name {
            font-weight: 500;
            color: #333;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .site-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        
        .btn {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: background 0.2s;
        }
        
        .btn-edit {
            background: #4a90d9;
            color: white;
        }
        
        .btn-edit:hover {
            background: #3a7bc8;
        }
        
        .btn-delete {
            background: #e74c3c;
            color: white;
        }
        
        .btn-delete:hover {
            background: #c0392b;
        }
        
        .add-site-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
        }
        
        .add-site-btn:hover {
            background: #219a52;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
        }
        
        .modal h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
            font-size: 13px;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #4a90d9;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-cancel:hover {
            background: #d0d0d0;
        }
        
        .btn-save {
            background: #4a90d9;
            color: white;
        }
        
        .btn-save:hover {
            background: #3a7bc8;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 AI Chat</h1>
        <select class="site-selector" id="siteSelector" onchange="switchSite()">
            <!-- Sites will be populated here -->
        </select>
    </div>
    
    <div class="iframe-container">
        <iframe id="siteFrame" class="site-frame" src=""></iframe>
        <div class="frame-overlay" id="frameOverlay">
            <h3>Unable to display in sidebar</h3>
            <p>This website blocks embedding in iframes. Click below to open it in a new tab.</p>
            <button class="btn-open-new" onclick="openCurrentInNewTab()">Open in New Tab</button>
        </div>
    </div>
    
    <div class="manage-section">
        <div class="manage-header">
            <h2>Manage Sites</h2>
        </div>
        <div class="site-list" id="siteList">
            <!-- Sites will be rendered here -->
        </div>
        <button class="add-site-btn" onclick="openAddModal()">+ Add New Site</button>
    </div>
    
    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Add New Site</h2>
            <div class="form-group">
                <label for="siteName">Site Name</label>
                <input type="text" id="siteName" placeholder="e.g., DeepSeek Chat">
            </div>
            <div class="form-group">
                <label for="siteUrl">Website URL</label>
                <input type="url" id="siteUrl" placeholder="https://example.com">
            </div>
            <input type="hidden" id="siteId">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveSite()">Save</button>
            </div>
        </div>
    </div>

    <script src="sidebar.js"></script>
</body>
</html>
