<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Sidebar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #1a1a2e;
            color: white;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 {
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .site-selector {
            flex: 1;
            padding: 8px 10px;
            border: none;
            border-radius: 6px;
            background: white;
            color: #333;
            font-size: 13px;
            cursor: pointer;
            min-width: 0;
        }
        
        .site-selector:focus {
            outline: 2px solid #4a90d9;
            outline-offset: 1px;
        }
        
        .content-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }
        
        .info-box {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
        }
        
        .info-box h3 {
            color: #333;
            font-size: 15px;
            margin-bottom: 8px;
        }
        
        .info-box p {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .site-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .site-card:hover {
            border-color: #4a90d9;
            box-shadow: 0 2px 8px rgba(74, 144, 217, 0.2);
        }
        
        .site-card.active {
            border-color: #4a90d9;
            background: #e8f4fc;
        }
        
        .site-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .site-info {
            flex: 1;
            min-width: 0;
        }
        
        .site-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .site-url {
            color: #888;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .site-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        
        .btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        
        .btn-edit {
            background: #4a90d9;
            color: white;
        }
        
        .btn-edit:hover {
            background: #3a7bc8;
        }
        
        .btn-delete {
            background: #e74c3c;
            color: white;
        }
        
        .btn-delete:hover {
            background: #c0392b;
        }
        
        .add-site-btn {
            background: linear-gradient(135deg, #27ae60 0%, #219a52 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .add-site-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
        }
        
        .modal h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
            font-size: 13px;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #4a90d9;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-cancel:hover {
            background: #d0d0d0;
        }
        
        .btn-save {
            background: #4a90d9;
            color: white;
        }
        
        .btn-save:hover {
            background: #3a7bc8;
        }
        
        .open-btn {
            background: linear-gradient(135deg, #4a90d9 0%, #3a7bc8 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-top: 15px;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .open-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 144, 217, 0.3);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 AI Chat</h1>
        <select class="site-selector" id="siteSelector">
            <!-- Sites will be populated here -->
        </select>
    </div>
    
    <div class="content-container">
        <div class="info-box">
            <h3>Quick Launch</h3>
            <p>Click a site below or use the dropdown to open in a new tab</p>
        </div>
        
        <div class="site-list" id="siteList">
            <!-- Sites will be rendered here -->
        </div>
        
        <button class="add-site-btn" onclick="openAddModal()">+ Add New Site</button>
        
        <button class="open-btn" id="openSelectedBtn" onclick="openSelectedSite()">
            🚀 Open Selected Site
        </button>
    </div>
    
    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Add New Site</h2>
            <div class="form-group">
                <label for="siteName">Site Name</label>
                <input type="text" id="siteName" placeholder="e.g., DeepSeek Chat">
            </div>
            <div class="form-group">
                <label for="siteUrl">Website URL</label>
                <input type="url" id="siteUrl" placeholder="https://example.com">
            </div>
            <input type="hidden" id="siteId">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveSite()">Save</button>
            </div>
        </div>
    </div>

    <script src="sidebar.js"></script>
</body>
</html>
